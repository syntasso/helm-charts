# Default values for ske-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global configuration for the operator and operator-crd subchart
global:
  skeOperator:
    tlsConfig:
      certManager:
        disabled: false
        # private key rotation policy default to 'Always'
        # uncomment to set policy to 'Never'
        # privateKey:
        #   rotationPolicy: Never
      # if custom certificate issuer is used, the following values are required
      # issuerRef:
      #   kind: ClusterIssuer
      #   name: custom-selfsigned-issuer
    # if certManager.disabled is set to true, the following values are required
    # global.skeOperator.tlsConfig.webhookCACert:
    # global.skeOperator.tlsConfig.webhookTLSKey:
    # global.skeOperator.tlsConfig.webhookTLSCert:
  # skeDeployment:
  # WARNING: when skeDeployment.deleteOnUninstall is true, uninstalling this helm chart will delete your SKE platform
  # only set to true for dev or testing environments
  # deleteOnUninstall: false
# Your SKE License Key.
# To avoid storing the license in plain text (e.g. for GitOps workflows), omit this field and
# instead pre-create a kubernetes.io/dockerconfigjson Secret manually, then set
# imageRegistry.imagePullSecret to its name. The chart will skip creating the pull secret.
skeLicense: "my-ske-license"
# Configuration for the Registry and Manifests
# Update these values if you are using a custom registry or bucket
# If using Syntasso Enterprise defaults, no changes are required
imageRegistry:
  # The host registry to pull the images from
  # Syntasso Enterprise images are hosted on ghcr.io
  # If you are using a custom registry, update this value to your registry host
  host: "ghcr.io"
  # The name of an existing image pull secret to use instead of creating one from skeLicense above.
  # Use this for GitOps workflows to avoid storing the license in Helm values:
  # pre-create a kubernetes.io/dockerconfigjson Secret and set its name here.
  # imagePullSecret: "my-secret"
  skeOperatorImage:
    # The name of the SKE operator use. Update this if you are using a custom image name for the operator
    name: "syntasso/ske-operator"
  skePlatformImage:
    # The name of the SKE Platform image
    name: "syntasso/ske-platform"
  skePlatformPipelineAdapterImage:
    # DEPRECATED: This field is no longer needed for SKE v0.37.0 and above
    # The name of the SKE-Platform Pipeline Adapter image
    name: "syntasso/ske-platform-pipeline-adapter"
  backstageControllerImage:
    # The name of the Backstage Controller image
    name: "syntasso/backstage-controller"
  cortexControllerImage:
    # The name of the Cortex Controller image
    name: "syntasso/ske-cortex-controller"
# Syntasso Enterprise manifests are available in the S3 bucket below
# If you are using a custom bucket, update the values accordingly
releaseStorage:
  # Parent directory containing release directories for multiple products, e.g. ske/ and ske-cortex-controller/.
  releasesPath: ""
  # DEPRECATED: path points directly to the SKE release directory itself, rather than the parent directory of all product releases.
  # It is still supported for the legacy SKE-only layout, but new installs should prefer releasesPath.
  # path and releasesPath are mutually exclusive.
  # path: "ske"
  # if you are using a Git repository to store the manifests, update the values below and comment out the bucket section.
  # git:
  #  branch: main
  #  repo: https://github.com/org/repo
  #  secret:
  #    name: git-creds # name of the Secret in the operator namespace containing keys: username, password
  #    # values: if provided, the chart creates the Secret from these plaintext credentials.
  #    # Omit values and pre-create the Secret yourself to avoid storing credentials in Helm values.
  #    values:
  #      username: "my-username"
  #      password: "my-password"

  bucket:
    name: "syntasso-enterprise-releases"
    region: "eu-west-2"
    # if you are using a custom endpoint, update this value
    # endpoint: "https://s3.eu-west-2.amazonaws.com"
    # If your bucket is private, provide credentials via a Secret in the operator namespace.
    # The Secret must contain the keys: accessKeyID, secretAccessKey.
    # secret:
    #   name: "my-secret" # name of an existing Secret, or a name to create if values are provided below
    #   # values: if provided, the chart creates the Secret from these plaintext credentials.
    #   # Omit values and pre-create the Secret yourself to avoid storing credentials in Helm values.
    #   values:
    #     accessKeyID: "my-access"
    #     secretAccessKey: "my-secret"
  # If you are mirroring SKE release bucket, you might need to provide a custom CA certificate
  # for accessing the release storage endpoints.
  # customCaCert:
  #   name: "ske-release-storage-custom-ca" # Secret name; default to ske-release-storage-custom-ca if not set
  #   values:
  #     caCert: |-
  #       -----BEGIN CERTIFICATE-----
  #       ...
  #       -----END CERTIFICATE-----
skeOperator:
  # Set if you want to change the resources for the operator container
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
      # ephemeral-storage: "2Gi"
    limits:
      memory: "256Mi"
      cpu: "100m"
      # ephemeral-storage: "4Gi"
  nodeSelector: {}
  tolerations: []
  affinity: {}
skeDeployment:
  # Set to true if you want to deploy SKE
  enabled: true
  # The version of ske to deploy
  version: "latest"
  deploymentConfig:
    resources:
      limits:
        memory: "256Mi"
        cpu: "100m"
      requests:
        memory: "256Mi"
        cpu: "100m"
  tlsConfig:
    certManager:
      disabled: false
      # if custom certificate issuer is used, the following values are required
      # issuerRef:
      #   name: "custom-selfsigned-issuer"
      #   kind: "ClusterIssuer"
    # if certManager.disabled is set to true, provide either inline cert values or secretRefs below.
    # Inline values (chart creates the Secrets from these plaintext values):
    # webhookCACert:
    # webhookTLSKey:
    # webhookTLSCert:
    # metricsServerCACert:
    # metricsServerTLSKey:
    # metricsServerTLSCert:
    # Secret references (chart skips creating the Secret; the referenced Secret must contain keys: ca.crt, tls.crt, tls.key):
    # webhookTLSSecretRef:
    #   name: "my-webhook-tls-secret"
    # metricsServerTLSSecretRef:
    #   name: "my-metrics-server-tls-secret"
  additionalResources: []
#   Example
#  - apiVersion: platform.kratix.io/v1alpha1
#    kind: Destination
#    metadata:
#      name: worker-1
#      labels:
#        environment: dev
#    spec:
#      stateStoreRef:
#        name: default
#        kind: BucketStateStore
#      path: path/in/statestore
#  - kind: BucketStateStore
#    apiVersion: platform.kratix.io/v1alpha1
#    metadata:
#      name: default
#    spec:
#      endpoint: minio.kratix-platform-system.svc.cluster.local
#      insecure: true
#      bucketName: kratix
#      authMethod: accessKey
#      secretRef:
#        name: minio-credentials
#        namespace: default

backstageIntegration:
  # Set to true if you want to deploy the SKE Backstage Controller
  enabled: false
  # The version of the controller to deploy
  version: "v0.6.0"
  deploymentConfig:
    resources:
      limits:
        memory: "256Mi"
        cpu: "100m"
      requests:
        memory: "256Mi"
        cpu: "100m"
cortexIntegration:
  # Set to true if you want to deploy the SKE Cortex integration
  enabled: false
  # The version of the integration to deploy
  version: "latest"
  deploymentConfig:
    resources:
      limits:
        memory: "256Mi"
        cpu: "100m"
      requests:
        memory: "256Mi"
        cpu: "100m"
  # Required when cortexIntegration.enabled is true
  config:
    branch: "" # e.g. "main"
    integrationAlias: "" # e.g. "my-github-alias"
    path: "" # e.g. "cortex-resource-requests/"
    provider: "" # only "github" is supported
    repositoryName: "" # e.g. "syntasso/cortex-resource-requests"
    # auth options (choose exactly one):
    # 1) set both token and url and this chart creates Secret `cortex-credentials`
    # 2) set secretRef.name to an existing Secret in kratix-platform-system
    # token/url and secretRef are mutually exclusive.
    token: ""
    url: ""
    # optional existing Secret reference (used only when token/url are not set)
    # secretRef:
    #   name: "cortex-credentials"
additionalResources: []
# Any additional k8s resources, such as Secrets, Configmaps
