# Chart tests (bats). Run locally: ./scripts/test-charts.sh (requires helm + bats-core).
name: Chart tests

on:
  push:
    paths:
      - 'ske-gui/**'
      - 'tests/chart-tests.bats'
      - '.github/workflows/chart-tests.yaml'
  pull_request:
    paths:
      - 'ske-gui/**'
      - 'tests/chart-tests.bats'
      - '.github/workflows/chart-tests.yaml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'
      - name: Setup Bats and bats libs
        id: setup-bats
        uses: bats-core/bats-action@4.0.0
      - name: Run chart tests
        shell: bash
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
        run: bats tests/chart-tests.bats
