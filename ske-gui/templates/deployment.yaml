{{- $oidc := .Values.oidc }}
{{- $env := .Values.env }}

{{- $clientId := "" }}
{{- $clientSecret := "" }}
{{- $issuerUrl := "" }}
{{- $scopes := "" }}
{{- $callbackURL := "" }}
{{- $validatorClientID := "" }}
{{- $validatorIssuerURL := "" }}
{{- $usePKCE := "" }}
{{- $useAccessToken := "" }}
{{- $meUserInfoURL := "" }}

# # This block of code is used to extract the values from the env.
# # This is done to check if the values are non-empty and if they are, they are used in the deployment.yaml.
{{- range $env }}
  {{- if eq .name "OIDC_CLIENT_ID" }}
    {{- $clientID = .value }}
  {{- end }}
  {{- if eq .name "OIDC_CLIENT_SECRET" }}
    {{- $clientSecret = .value }}
  {{- end }}
  {{- if eq .name "OIDC_ISSUER_URL" }}
    {{- $issuerUrl = .value }}
  {{- end }}
  {{- if eq .name "OIDC_SCOPES" }}
    {{- $scopes = .value }}
  {{- end }}
  {{- if eq .name "OIDC_CALLBACK_URL" }}
    {{- $callbackURL = .value }}
  {{- end }}
  {{- if eq .name "OIDC_VALIDATOR_CLIENT_ID" }}
    {{- $validatorClientID = .value }}
  {{- end }}
  {{- if eq .name "OIDC_VALIDATOR_ISSUER_URL" }}
    {{- $validatorIssuerURL = .value }}
  {{- end }}
  {{- if eq .name "OIDC_USE_ACCESS_TOKEN" }}
    {{- $useAccessToken = .value | toString }}
  {{- end }}
  {{- if eq .name "OIDC_USE_PKCE" }}
    {{- $usePKCE = .value | toString }}
  {{- end }}
  {{- if eq .name "ME_USER_INFO_URL" }}
    {{- $meUserInfoURL = .value | toString }}
  {{- end }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ske-gui
  namespace: kratix-platform-system
  labels:
    {{- include "ske-gui.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ske-gui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ske-gui.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "ske-gui.serviceAccountName" . }}
      hostUsers: {{ .Values.hostUsers }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ske-gui
          securityContext:
            {{- if .Values.securityContext }}
              {{- toYaml .Values.securityContext | nindent 12 }}
            {{- else }}
              {{- $defaultSC := dict "allowPrivilegeEscalation" false "runAsNonRoot" true "seccompProfile" (dict "type" "RuntimeDefault") "capabilities" (dict "drop" (list "ALL")) }}
              {{- toYaml $defaultSC | nindent 12 }}
            {{- end }}
          image: "{{ .Values.imageRegistry.host }}/{{ .Values.imageRegistry.imageName }}:{{ .Values.imageRegistry.imageVersion }}"
          imagePullPolicy: {{ .Values.imageRegistry.imagePullPolicy | default "IfNotPresent" }}
          {{ if or $oidc .Values.env }}
          {{- if $oidc.externalSecret }}
          {{- if $oidc.externalSecret.enabled }}
          envFrom:
          - secretRef:
              name: {{ $oidc.externalSecret.name }}
          {{- end }}
          {{- if .Values.env }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
          {{- else }}
          env:
            {{- if $oidc.secret }}
            {{- if $oidc.secret.create }}
            {{- if $oidc.clientId }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $oidc.secret.name }}
                  key: clientId
            {{- end }}
            {{- end }}
            {{- if $oidc.clientSecret }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $oidc.secret.name }}
                  key: clientSecret
            {{- end }}
            {{- if $oidc.issuerUrl }}
            - name: OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $oidc.secret.name }}
                  key: issuerUrl
            {{- end }}
            {{- if $oidc.scopes }}
            - name: OIDC_SCOPES
              valueFrom:
                secretKeyRef:
                  name: {{ $oidc.secret.name }}
                  key: scopes
            {{- end }}
            {{- if $oidc.callbackURL }}
            - name: OIDC_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $oidc.secret.name }}
                  key: callbackURL
            {{- end }}
            {{- if $oidc.validatorClientID }}
            - name: OIDC_VALIDATOR_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $oidc.secret.name }}
                  key: validatorClientID
            {{- end }}
            {{- if $oidc.validatorIssuerURL }}
            - name: OIDC_VALIDATOR_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $oidc.secret.name }}
                  key: validatorIssuerURL
            {{- end }}
            {{- if $oidc.useAccessToken }}
            - name: OIDC_USE_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $oidc.secret.name }}
                  key: useAccessToken
            {{- end }}
            {{- if $oidc.usePKCE }}
            - name: OIDC_USE_PKCE
              valueFrom:
                secretKeyRef:
                  name: {{ $oidc.secret.name }}
                  key: usePKCE
            {{- end }}
            {{- if $oidc.meUserInfoURL }}
            - name: ME_USER_INFO_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $oidc.secret.name }}
                  key: meUserInfoURL
            {{- end }}
            {{- else }}
            {{- if $oidc.clientId }}
            - name: OIDC_CLIENT_ID
              value: {{ $oidc.clientId }}
            {{- end }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.oidc.secretRef }}{{ .Values.oidc.secretRef.name | default "headlamp-oidc-secret" | quote }}{{ else }}"headlamp-oidc-secret"{{ end }}
                  key: {{ if .Values.oidc.secretRef }}{{ .Values.oidc.secretRef.key | default "client-secret" | quote }}{{ else }}"client-secret"{{ end }}
            - name: OIDC_SCOPES
              value: {{ .Values.oidc.scopes | default "profile,email" }}
            {{- if $oidc.issuerUrl }}
            - name: OIDC_ISSUER_URL
              value: {{ $oidc.issuerUrl }}
            {{- end }}
            {{- if $oidc.callbackURL }}
            - name: OIDC_CALLBACK_URL
              value: {{ $oidc.callbackURL }}
            {{- end }}
            {{- if $oidc.validatorClientID }}
            - name: OIDC_VALIDATOR_CLIENT_ID
              value: {{ $oidc.validatorClientID }}
            {{- end }}
            {{- if $oidc.validatorIssuerURL }}
            - name: OIDC_VALIDATOR_ISSUER_URL
              value: {{ $oidc.validatorIssuerURL }}
            {{- end }}
            {{- if $oidc.useAccessToken }}
            - name: OIDC_USE_ACCESS_TOKEN
              value: {{ $oidc.useAccessToken | quote }}
            {{- end }}
            {{- if $oidc.usePKCE }}
            - name: OIDC_USE_PKCE
              value: {{ $oidc.usePKCE | quote }}
            {{- end }}
            {{- if $oidc.meUserInfoURL }}
            - name: ME_USER_INFO_URL
              value: {{ $oidc.meUserInfoURL }}
            {{- end }}
            {{- end }}
            {{- if .Values.env }}
            {{- toYaml .Values.env | nindent 12 }}
            {{- end }}
          {{- end }}
            - name: HEADLAMP_CONFIG_TRACING_ENABLED
              value: {{ .Values.tracing.enabled | quote }}
            - name: HEADLAMP_CONFIG_METRICS_ENABLED
              value: {{ .Values.metrics.enabled  | quote }}
            - name: HEADLAMP_CONFIG_OTLP_ENDPOINT
              value: {{ .Values.otlpEndpoint }}
            - name: HEADLAMP_CONFIG_SERVICE_NAME
              value: "headlamp"
            - name: HEADLAMP_CONFIG_SERVICE_VERSION
              value: "latest"
          {{- end }}
          args:
            {{- if .Values.inCluster }}
            - "-in-cluster"
            {{- if .Values.inClusterContextName }}
            - "-in-cluster-context-name={{ .Values.inClusterContextName }}"
            {{- end }}
            {{- end }}
            {{- with .Values.enableHelm }}
            - "-enable-helm"
            {{- end }}
            {{- if .Values.watchPlugins }}
            - "-watch-plugins-changes"
            {{- end }}
            {{- with .Values.pluginsDir}}
            - "-plugins-dir={{ . }}"
            {{- end }}
            {{- if not (and $oidc.externalSecret $oidc.externalSecret.enabled) }}
            # Check if externalSecret is disabled
            {{- if or (ne $oidc.clientId "") (ne $clientId "") }}
            # Check if clientID is non empty either from env or oidc.config
            - "-oidc-client-id=$(OIDC_CLIENT_ID)"
            {{- end }}
            {{- if or (ne $oidc.clientSecret "") (ne $clientSecret "") }}
            # Check if clientSecret is non empty either from env or oidc.config
            - "-oidc-client-secret=$(OIDC_CLIENT_SECRET)"
            {{- end }}
            {{- if or (ne $oidc.issuerUrl "") (ne $issuerUrl "") }}
            # Check if issuerURL is non empty either from env or oidc.config
            - "-oidc-idp-issuer-url=$(OIDC_ISSUER_URL)"
            {{- end }}
            {{- if or (ne $oidc.scopes "") (ne $scopes "") }}
            # Check if scopes are non empty either from env or oidc.config
            - "-oidc-scopes=$(OIDC_SCOPES)"
            {{- end }}
            {{- if or (ne $oidc.callbackURL "") (ne $callbackURL "") }}
            # Check if callbackURL is non empty either from env or oidc.config
            - "-oidc-callback-url=$(OIDC_CALLBACK_URL)"
            {{- end }}
            {{- if or (ne $oidc.validatorClientID "") (ne $validatorClientID "") }}
            # Check if validatorClientID is non empty either from env or oidc.config
            - "-oidc-validator-client-id=$(OIDC_VALIDATOR_CLIENT_ID)"
            {{- end }}
            {{- if or (ne $oidc.validatorIssuerURL "") (ne $validatorIssuerURL "") }}
            # Check if validatorIssuerURL is non empty either from env or oidc.config
            - "-oidc-validator-idp-issuer-url=$(OIDC_VALIDATOR_ISSUER_URL)"
            {{- end }}
            {{- if or (ne ($oidc.useAccessToken | toString) "false") (ne $useAccessToken "") }}
            # Check if useAccessToken is non false either from env or oidc.config
            - "-oidc-use-access-token=$(OIDC_USE_ACCESS_TOKEN)"
            {{- end }}
            {{- if or (eq ($oidc.usePKCE | toString) "true") (eq $usePKCE "true") }}
            - "-oidc-use-pkce=$(OIDC_USE_PKCE)"
            {{- end }}
            {{- if or (ne $oidc.meUserInfoURL "") (ne $meUserInfoURL "") }}
            - "-me-user-info-url=$(ME_USER_INFO_URL)"
            {{- end }}
            {{- else }}
            - "-oidc-client-id={ $oidc.clientId }"
            - "-oidc-client-secret=$(OIDC_CLIENT_SECRET)"
            - "-oidc-idp-issuer-url=$(OIDC_ISSUER_URL)"
            - "-oidc-scopes=$(OIDC_SCOPES)"
            {{- if or (ne $oidc.callbackURL "") (ne $callbackURL "") }}
            # Check if callbackURL is non empty either from env or oidc.config
            - "-oidc-callback-url=$(OIDC_CALLBACK_URL)"
            {{- end }}
            {{- if or (eq ($oidc.usePKCE | toString) "true") (eq $usePKCE "true") }}
            - "-oidc-use-pkce=$(OIDC_USE_PKCE)"
            {{- end }}
            {{- if or (ne $oidc.validatorClientID "") (ne $validatorClientID "") }}
            # Check if validatorClientID is non empty either from env or oidc.config
            - "-oidc-validator-client-id=$(OIDC_VALIDATOR_CLIENT_ID)"
            {{- end }}
            {{- if or (ne $oidc.validatorIssuerURL "") (ne $validatorIssuerURL "") }}
            # Check if validatorIssuerURL is non empty either from env or oidc.config
            - "-oidc-validator-idp-issuer-url=$(OIDC_VALIDATOR_ISSUER_URL)"
            {{- end }}
            {{- if or (eq ($oidc.useAccessToken | toString) "true") (eq $useAccessToken "true") }}
            # Check if useAccessToken is non false either from env or oidc.config
            - "-oidc-use-access-token=$(OIDC_USE_ACCESS_TOKEN)"
            {{- end }}
            {{- if or (ne $oidc.meUserInfoURL "") (ne $meUserInfoURL "") }}
            - "-me-user-info-url=$(ME_USER_INFO_URL)"
            {{- end }}
            {{- end }}
            {{- with .Values.baseURL }}
            - "-base-url={{ . }}"
            {{- end }}
            {{- with .Values.tlsCertPath }}
            - "-tls-cert-path={{ . }}"
            {{- end }}
            {{- with .Values.tlsKeyPath }}
            - "-tls-key-path={{ . }}"
            {{- end }}
            {{- with .Values.extraArgs }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 4466
            - name: metrics
              containerPort: 9090
          livenessProbe:
            httpGet:
              path: "/"
              port: http
          readinessProbe:
            httpGet:
              path: "/"
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.volumeMounts }}
          volumeMounts:
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      imagePullSecrets:
        - name: '{{ .Values.imageRegistry.imagePullSecret | default "syntasso-registry" }}'
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- with .Values.volumes}}
        {{- toYaml . | nindent 8 }}
        {{- end }}