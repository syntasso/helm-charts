{{- if and .Values.oidc (not .Values.oidc.secretRef) }}
{{- with .Values.oidc }}
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-oidc-secret
  namespace: kratix-platform-system
type: Opaque
data:
{{- with .clientSecret }}
  client-secret: {{ . | b64enc | quote }}
{{- end }}
{{- with .clientId }}
  clientID: {{ . | b64enc | quote }}
{{- end }}
{{- end }}
{{- with .issuerURL }}
  issuerURL: {{ . | b64enc | quote }}
{{- end }}
{{- with .scopes }}
  scopes: {{ . | b64enc | quote }}
{{- end }}
{{- with .callbackURL }}
  callbackURL: {{ . | b64enc | quote }}
{{- end }}
{{- with .validatorClientID }}
  validatorClientID: {{ . | b64enc | quote }}
{{- end }}
{{- with .validatorIssuerURL }}
  validatorIssuerURL: {{ . | b64enc | quote }}
{{- end }}
{{- with .useAccessToken }}
  useAccessToken: {{ . | toString | b64enc | quote }}
{{- end }}
{{- with .usePKCE }}
  usePKCE: {{ . | toString | b64enc | quote }}
{{- end }}
{{- with .meUserInfoURL }}
  meUserInfoURL: {{ . | b64enc | quote }}
{{- end }}
{{- end }}
