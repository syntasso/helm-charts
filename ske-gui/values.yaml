# Configuration for the image Registry
# Update these values if you are using a custom registry
# If using Syntasso Enterprise defaults, no changes are required
imageRegistry:
  # The host registry to pull the images from
  # Syntasso Enterprise images are hosted on ghcr.io
  # If you are using a custom registry, update this value to your registry host
  host: "ghcr.io"
  imageName: "syntasso/ske-gui"
  imageVersion: "v0.7.0"
  # Name of the image pull secret to use.
  imagePullSecret: "syntasso-registry"
  # imagePullPolicy: IfNotPresent
# Service account to use for the SKE GUI
serviceAccount:
  create: true
  name: "ske-gui-admin"
# RBAC (ClusterRoleBinding) to grant admin permissions to the service account
rbac:
  create: true
# Service configuration
service:
  type: ClusterIP
  port: 80
# Deployment resource configuration
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "100m"
nodeSelector: {}
tolerations: []
affinity: {}
# Ingress configuration
ingress:
  enabled: false # Set to true to enable ingress controller resource
  # -- Additional labels to add to the Ingress resource
  labels: {}
  ingressClassName: ""
  annotations: {}
  # -- Hostname(s) for the Ingress resource
  # Please refer to https://kubernetes.io/docs/reference/kubernetes-api/service-resources/ingress-v1/#IngressSpec for more information.
  hosts: []
  # - host: chart-example.local
  #   paths:
  #   - path: /
  #     type: ImplementationSpecific
  # -- Ingress TLS configuration
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
# SKE GUI OIDC configuration, add the following values if you are using OIDC
# oidc:
#  issuerUrl:
#  clientId:
#  clientSecret:   # omit when using secretRef (e.g. for ArgoCD / GitOps)
#  # Reference an existing secret instead of providing clientSecret in values (recommended for GitOps)
#  secretRef:
#    name: my-oidc-secret   # name of the existing Secret
#    key: clientSecret     # key within the Secret (default: clientSecret)
## SKE GUI requests the profile and email scopes by default. More scopes can be added by using the following value.
#  scopes: profile,email
# -- OIDC issuer URL
# issuerURL: ""
# # -- OIDC scopes to be used
# scopes: ""
# # -- OIDC callback URL
# callbackURL: ""
# # -- OIDC client to be used during token validation
# validatorClientID: ""
# # -- OIDC Issuer URL to be used during token validation
# validatorIssuerURL: ""
# # -- Use 'access_token' instead of 'id_token' when authenticating using OIDC
# useAccessToken: false
# # -- Use PKCE (Proof Key for Code Exchange) for enhanced security in OIDC flow
# usePKCE: false

# -- URL to fetch additional user info for the /me endpoint.
# For oauth2proxy /oauth2/userinfo can be used. Empty and it will not be used.
# meUserInfoURL: ""

tracing:
  enabled: false
metrics:
  enabled: false
otlpEndpoint: otel-collector:4317
# -- Headlamp pod's Security Context

inCluster: true
inClusterContextName: "main"
baseURL: ""
# -- Labels to add to the pod
podLabels: {}
# -- Annotations to add to the pod
podAnnotations: {}
hostUsers: true
# -- Headlamp pod's Security Context
podSecurityContext: {}
# fsGroup: 2000

# -- Headlamp containers Security Context
securityContext:
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  runAsNonRoot: true
  privileged: false
  runAsUser: 100
  runAsGroup: 101
# Uses these defaults if this is empty.
#   allowPrivilegeEscalation: false
#   runAsNonRoot: true
#   seccompProfile:
#     type: RuntimeDefault
#   capabilities:
#     drop:
#       - ALL

# -- Headlamp containers volume mounts
volumeMounts: []
# -- Headlamp pod's volumes
volumes: []
